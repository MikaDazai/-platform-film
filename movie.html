<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineVerse | Watch</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="movie">
    <div class="page-shell">
      <header class="topbar">
        <a class="brand" href="index.html">
          <span class="brand__mark">CV</span>
          <div>
            <strong>CineVerse</strong>
            <span>AI movie portfolio</span>
          </div>
        </a>

        <nav class="topnav" aria-label="Navigation">
          <a href="index.html" data-i18n="nav.home">Home</a>
          <a href="index.html#premieres" data-i18n="nav.new">New</a>
          <a href="index.html#catalog" data-i18n="nav.catalog">Catalog</a>
        </nav>

        <div class="language-switcher" aria-label="Language switcher">
          <button class="language-switcher__button is-active" type="button" data-lang="en">EN</button>
          <button class="language-switcher__button" type="button" data-lang="uk">UKR</button>
        </div>
      </header>

      <main class="player-page">
        <section class="player-layout">
          <div class="player-frame">
            <div class="player-logo">CineVerse Player</div>
            <video id="movie-player" controls playsinline poster="">
              Your browser does not support video.
            </video>
            <div class="player-placeholder" id="player-placeholder">
              <div>
                <strong data-i18n="player.emptyTitle">Video is not connected yet</strong>
                <p data-i18n="player.emptyText">
                  Add your AI film to the project and set its path in the <code>app.js</code>
                  file.
                </p>
              </div>
            </div>
          </div>

          <aside class="movie-info" id="movie-info"></aside>
        </section>

        <section class="recommendations" aria-labelledby="more-title">
          <div class="section-head">
            <h2 id="more-title" data-i18n="recommendations.title">More to show</h2>
            <span data-i18n="recommendations.text">Additional works for your portfolio</span>
          </div>
          <div class="movie-strip" id="recommendations-strip"></div>
        </section>
      </main>
    </div>

    <script src="app-portfolio.js"></script>
  </body>
</html>
